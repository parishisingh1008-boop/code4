<!DOCTYPE html>
<html>
<head>
  <title>Email Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffe6eb, #ffd6e0);
    }

    /* CENTER */
    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* PHONE */
    .phone {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      .phone {
        height: 844px;
        border-radius: 25px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      }
    }

    /* HEADER */
    .header {
      padding: 20px;
    }

    .back {
      font-size: 18px;
      cursor: pointer;
    }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 20px;
    }

    h2 {
      margin: 10px 0;
    }

    .sub {
      color: #777;
      font-size: 14px;
      margin-bottom: 25px;
    }

    /* INPUT BOX */
    .input-box {
      background: #f8f8f8;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 16px;
      outline: none;
    }

    /* FOOTER */
    .footer {
      padding: 20px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #ff4d6d, #ff758c);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .logo {
      text-align: center;
      color: #ff4d6d;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="wrapper">
  <div class="phone">

    <!-- HEADER -->
    <div class="header">
      <div class="back" onclick="go('login.html')">←</div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <div class="logo">StudyMatch</div>

      <h2>Login with Email</h2>
      <div class="sub">Enter your details to continue</div>

      <div class="input-box">
        <input type="email" id="email" placeholder="Email address">
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password">
      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      <button class="btn" onclick="login()">
        Continue →
      </button>
    </div>

  </div>
</div>

<script>
function go(page){
  window.location.href = page;
}

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(email && password){
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("userEmail", email);

    window.location.href = "goal.html";
  } else {
    alert("Please enter email and password");
  }
}
</script>

</body>
</html>
