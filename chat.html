<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#f5f5f5;
  display:flex;
  justify-content:center;
}

.phone{
  width:100%;
  max-width:390px;
  height:100vh;
  background:#fff;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  background:#ff4d6d;
  color:white;
  display:flex;
  align-items:center;
  gap:10px;
}

.back{
  cursor:pointer;
}

/* CHAT AREA */
.chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg{
  padding:10px 15px;
  border-radius:15px;
  margin:10px 0;
  max-width:70%;
}

.left{
  background:#eee;
}

.right{
  background:#ff4d6d;
  color:white;
  margin-left:auto;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
  outline:none;
}

button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}
</style>
</head>

<body>

<div class="phone">

<div class="header">
  <div class="back" onclick="go('match.html')">←</div>
  <div id="username">User</div>
</div>

<div class="chat" id="chatBox">
  <div class="msg left">Hey! Ready to work on our goal?</div>
</div>

<div class="input-area">
  <input type="text" id="msgInput" placeholder="Type message...">
  <button onclick="send()">Send</button>
</div>

</div>

<script>
const name = localStorage.getItem("matchName") || "Partner";
document.getElementById("username").innerText = name;

function send(){
  const input = document.getElementById("msgInput");
  const text = input.value;

  if(text.trim() === "") return;

  const msg = document.createElement("div");
  msg.className = "msg right";
  msg.innerText = text;

  document.getElementById("chatBox").appendChild(msg);
  input.value = "";

  // auto reply (fake)
  setTimeout(()=>{
    const reply = document.createElement("div");
    reply.className = "msg left";
    reply.innerText = "Sounds good! 👍";
    document.getElementById("chatBox").appendChild(reply);
  },1000);
}

function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
