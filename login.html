<!DOCTYPE html>
<html>
<head>
  <title>StudyMatch - Login</title>

  <!-- IMPORTANT -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffe6eb, #ffd6e0);
    }

    /* CENTER WRAPPER */
    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* PHONE CONTAINER */
    .phone {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      padding: 25px;
    }

    /* LAPTOP VIEW */
    @media (min-width: 768px) {
      .phone {
        height: 844px;
        border-radius: 25px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      }
    }

    /* LOGO */
    .logo {
      font-size: 30px;
      font-weight: bold;
      color: #ff4d6d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #777;
      margin-bottom: 40px;
    }

    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border-radius: 15px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(135deg, #ff4d6d, #ff758c);
      color: white;
    }

    .secondary {
      background: #f5f5f5;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

<div class="wrapper">
  <div class="phone">

    <div class="logo">StudyMatch</div>
    <div class="subtitle">Find your perfect partner</div>

    

    <button class="btn secondary" onclick="go('email.html')">
  Continue with Email
</button>

   

    <div class="footer">
      By continuing, you agree to our Terms
    </div>

  </div>
</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
